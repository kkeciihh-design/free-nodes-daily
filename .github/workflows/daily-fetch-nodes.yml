name: Daily Fetch Nodes

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00 触发（根据需要调整）
  workflow_dispatch:

jobs:
  fetch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        run: python src/fetcher.py

      - name: Run validator
        run: python src/validator.py

      - name: Commit data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Daily nodes update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push
